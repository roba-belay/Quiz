<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Builder App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🧠 Quiz Builder</h1>

    <!-- CREATE QUIZ -->
    <div id="create-box">

        <input type="text" id="questionInput" placeholder="Enter question">

        <input type="text" id="opt1" placeholder="Option 1">
        <input type="text" id="opt2" placeholder="Option 2">
        <input type="text" id="opt3" placeholder="Option 3">
        <input type="text" id="opt4" placeholder="Option 4">

        <input type="text" id="correctInput" placeholder="Correct answer">

        <button id="addBtn">Add Question</button>
        <button id="startBtn">Start Quiz</button>

    </div>

    <!-- QUIZ -->
    <div id="quiz-box" class="hide">

        <h2 id="question">Question</h2>
        <div id="options"></div>

        <button id="nextBtn">Next</button>

    </div>

    <!-- RESULT -->
    <div id="result" class="hide">
        <h2>Result</h2>
        <p id="score"></p>
        <button onclick="location.reload()">Restart</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
